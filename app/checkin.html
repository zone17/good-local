<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Check in · Good Local</title>
  <meta name="description" content="Scan to earn a stamp at the independent businesses of the Upper Delaware. No app download. Every visit builds your passport.">
  <meta name="theme-color" content="#1d4231">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="icon" type="image/svg+xml" href="/icon.svg">
  <link rel="apple-touch-icon" href="/icon.svg">
  <style>
    /* Confirmation-flow keyframes live in the document head so they exist at
       first paint (design-handoff lesson, 2026-06-07). */
    @keyframes gl-halo-burst {
      from { transform: translateX(-50%) scale(0.4); opacity: 0; }
      60%  { opacity: 0.9; }
      to   { transform: translateX(-50%) scale(1.05); opacity: 0.7; }
    }
    /* transform-only — animating opacity on text-bearing blocks makes axe
       measure mid-fade contrast (flaky AA failures) */
    @keyframes gl-rise {
      from { transform: translateY(8px); }
      to   { transform: translateY(0); }
    }
    @keyframes gl-fade { from { opacity: 0; } to { opacity: 1; } }
    @keyframes gl-sheet-up {
      from { transform: translateY(60px); opacity: 0; }
      to   { transform: translateY(0); opacity: 1; }
    }
    .gl-rise { animation: gl-rise 360ms 120ms ease-out both; }
    @media (prefers-reduced-motion: reduce) {
      .gl-rise { animation: none; }
    }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="module" src="/src/checkin/main.jsx"></script>
</body>
</html>
