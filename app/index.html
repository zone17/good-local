<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Good Local · The Upper Delaware Passport</title>
  <meta name="description" content="A regional passport for the independent places you love. Earn a stamp every visit, unlock perks, and discover where locals keep going back. No app to download.">
  <meta name="theme-color" content="#1d4231">
  <link rel="icon" type="image/svg+xml" href="/icon.svg">
  <link rel="apple-touch-icon" href="/icon.svg">
  <!-- Preconnect + load the webfont CSS from the HTML so the request starts at
       parse time, not after the app's CSS @import resolves (LCP win). -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@0,6..72,300..800;1,6..72,300..800&family=Public+Sans:ital,wght@0,200..900;1,200..900&family=DM+Mono:ital,wght@0,400;0,500;1,400&display=swap">
  <style>
    /* Screen-entrance keyframes live in the document head — defined inside the
       rendered React tree they don't exist at first paint and the screen sits
       at opacity 0 (design-handoff lesson, 2026-06-07). */
    /* transform-only — animating opacity on text-bearing blocks makes axe
       measure mid-fade contrast (flaky AA failures) */
    @keyframes gl-screen-in {
      from { transform: translateX(8px); }
      to   { transform: translateX(0); }
    }
    .gl-screen-in { animation: gl-screen-in 200ms ease-out both; }
    @media (prefers-reduced-motion: reduce) {
      .gl-screen-in { animation: none; }
    }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="module" src="/src/main.jsx"></script>
</body>
</html>
