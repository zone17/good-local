<!-- @dsCard group="Spacing" viewport="700x160" name="Radii" subtitle="Heritage = less round. Stamp = sharp; pass = 14." -->
<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;padding:22px 28px;background:var(--paper-50);font-family:var(--font-body);color:var(--ink-1000)}
  .row{display:flex;gap:18px;align-items:flex-end}
  .item{display:flex;flex-direction:column;gap:8px;align-items:center}
  .tile{width:74px;height:74px;background:var(--pine-700)}
  .lbl{font-family:var(--font-mono);font-size:10px;color:var(--ink-500);letter-spacing:0.04em;text-align:center;line-height:1.3}
  .lbl b{color:var(--ink-1000)}
</style></head>
<body>
  <div class="row">
    <div class="item"><div class="tile" style="border-radius:3px"></div><span class="lbl"><b>stamp</b><br>3</span></div>
    <div class="item"><div class="tile" style="border-radius:4px"></div><span class="lbl"><b>xs</b><br>4</span></div>
    <div class="item"><div class="tile" style="border-radius:6px"></div><span class="lbl"><b>sm</b><br>6</span></div>
    <div class="item"><div class="tile" style="border-radius:10px"></div><span class="lbl"><b>md ★</b><br>10</span></div>
    <div class="item"><div class="tile" style="border-radius:14px"></div><span class="lbl"><b>lg / pass</b><br>14</span></div>
    <div class="item"><div class="tile" style="border-radius:20px"></div><span class="lbl"><b>xl</b><br>20</span></div>
    <div class="item"><div class="tile" style="border-radius:28px"></div><span class="lbl"><b>2xl</b><br>28</span></div>
    <div class="item"><div class="tile" style="border-radius:999px"></div><span class="lbl"><b>pill</b><br>999</span></div>
  </div>
</body></html>
