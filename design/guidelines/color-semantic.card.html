<!-- @dsCard group="Colors" viewport="700x140" name="Semantic & surfaces" subtitle="Named slots: pages, cards, pass, stamp, danger." -->
<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css"><link rel="stylesheet" href="_card.css"></head>
<body class="card-shell">
  <div class="card-row" style="border-radius:8px;overflow:hidden;height:88px">
    <div class="swatch" style="background:var(--surface-page);color:var(--text-primary)"><span class="name">page</span><span class="hex">paper-50</span></div>
    <div class="swatch" style="background:var(--surface-page-warm);color:var(--text-primary)"><span class="name">page-warm</span><span class="hex">paper-100</span></div>
    <div class="swatch" style="background:var(--surface-card);color:var(--text-primary);box-shadow:inset 0 0 0 1px var(--ink-100)"><span class="name">card</span><span class="hex">white</span></div>
    <div class="swatch" style="background:var(--surface-card-kraft);color:var(--text-primary)"><span class="name">kraft</span><span class="hex">paper-200</span></div>
    <div class="swatch" style="background:var(--surface-pass);color:var(--text-on-pine)"><span class="name">pass</span><span class="hex">pine-700</span></div>
    <div class="swatch" style="background:var(--surface-stamp);color:var(--text-on-stamp)"><span class="name">stamp</span><span class="hex">stamp-700</span></div>
    <div class="swatch" style="background:var(--info);color:var(--paper-100)"><span class="name">info</span><span class="hex">river-700</span></div>
    <div class="swatch" style="background:var(--warning);color:var(--paper-100)"><span class="name">warning</span><span class="hex">ochre-700</span></div>
  </div>
</body></html>
