<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;padding:24px 32px;background:var(--paper-50);display:flex;align-items:center;gap:36px}
  .icons{display:flex;align-items:center;gap:18px}
  .iconwrap{display:flex;flex-direction:column;align-items:center;gap:8px}
  .iconwrap span{font:500 11px/1 var(--font-mono);color:var(--ink-500);letter-spacing:0.06em}
  .imp{padding:8px 14px;background:var(--paper-100);border-radius:10px}
</style></head>
<body>
  <div class="icons">
    <div class="iconwrap"><img src="../assets/app-icon.svg" style="width:88px;height:88px;border-radius:20px;box-shadow:var(--shadow-card)"/><span>88·iOS</span></div>
    <div class="iconwrap"><img src="../assets/app-icon.svg" style="width:64px;height:64px;border-radius:14px;box-shadow:var(--shadow-card)"/><span>64</span></div>
    <div class="iconwrap"><img src="../assets/app-icon.svg" style="width:40px;height:40px;border-radius:9px"/><span>40</span></div>
  </div>
  <div class="imp"><img src="../assets/stamp-impression.svg" style="height:130px"/></div>
</body></html>
