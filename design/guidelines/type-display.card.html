<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;padding:24px 28px;background:var(--paper-50);font-family:var(--font-body)}
  .row{display:flex;align-items:baseline;justify-content:space-between;gap:24px;color:var(--ink-1000)}
  .row + .row{margin-top:10px}
  .sample{font-family:var(--font-display);font-variation-settings:"opsz" 48;line-height:1;letter-spacing:var(--tracking-tight)}
  .meta{font-family:var(--font-mono);font-size:11px;color:var(--ink-500);letter-spacing:0.05em}
</style></head>
<body>
  <div class="row"><span class="sample" style="font-size:54px;font-weight:600">You're 2 visits from regular</span><span class="meta">54 · 600</span></div>
  <div class="row"><span class="sample" style="font-size:32px;font-weight:500;font-style:italic">Narrowsburg, season one</span><span class="meta">32 · 500 italic</span></div>
  <div class="row"><span class="sample" style="font-size:22px;font-weight:400">Verified regulars this week</span><span class="meta">22 · 400</span></div>
</body></html>
