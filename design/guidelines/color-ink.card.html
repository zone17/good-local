<!-- @dsCard group="Colors" viewport="700x150" name="Ink — neutrals" subtitle="Warm-leaning, not pure greys. Text + borders." -->
<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css"><link rel="stylesheet" href="_card.css"></head>
<body class="card-shell">
  <div class="card-row" style="border-radius:8px;overflow:hidden">
    <div class="swatch" style="background:var(--ink-1000);color:var(--paper-100)"><span class="name">Ink 1000 ★</span><span class="hex">#1A1612</span></div>
    <div class="swatch" style="background:var(--ink-900);color:var(--paper-100)"><span class="name">900</span><span class="hex">#2A241C</span></div>
    <div class="swatch" style="background:var(--ink-700);color:var(--paper-100)"><span class="name">700</span><span class="hex">#3D352B</span></div>
    <div class="swatch" style="background:var(--ink-500);color:var(--paper-100)"><span class="name">500</span><span class="hex">#6E665A</span></div>
    <div class="swatch" style="background:var(--ink-400);color:var(--paper-100)"><span class="name">400</span><span class="hex">#8B8275</span></div>
    <div class="swatch" style="background:var(--ink-300);color:var(--ink-900)"><span class="name">300</span><span class="hex">#B3AB9E</span></div>
    <div class="swatch" style="background:var(--ink-200);color:var(--ink-900)"><span class="name">200</span><span class="hex">#D1CAB8</span></div>
    <div class="swatch" style="background:var(--ink-100);color:var(--ink-900)"><span class="name">100</span><span class="hex">#E2DCC9</span></div>
  </div>
</body></html>
