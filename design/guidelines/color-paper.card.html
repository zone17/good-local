<!-- @dsCard group="Colors" viewport="700x150" name="Paper — backgrounds" subtitle="Warm cream surfaces. NO pure white pages." -->
<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css"><link rel="stylesheet" href="_card.css"></head>
<body class="card-shell" style="background:var(--ink-100)">
  <div class="card-row" style="border-radius:8px;overflow:hidden">
    <div class="swatch" style="background:var(--paper-50);color:var(--ink-900)"><span class="name">Paper 50 ★</span><span class="hex">#FBF8F1</span></div>
    <div class="swatch" style="background:var(--paper-100);color:var(--ink-900)"><span class="name">100</span><span class="hex">#F6F1E4</span></div>
    <div class="swatch" style="background:var(--paper-200);color:var(--ink-900)"><span class="name">200</span><span class="hex">#ECE4D0</span></div>
    <div class="swatch" style="background:var(--paper-300);color:var(--ink-900)"><span class="name">300 kraft</span><span class="hex">#DCD0B0</span></div>
    <div class="swatch" style="background:var(--paper-400);color:var(--paper-100)"><span class="name">400 kraft+</span><span class="hex">#BFAF85</span></div>
    <div class="swatch" style="background:var(--white);color:var(--ink-900)"><span class="name">white</span><span class="hex">#FFFFFF</span></div>
  </div>
</body></html>
