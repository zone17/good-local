<!-- @dsCard group="Spacing" viewport="700x160" name="Tap targets" subtitle="44px floor; 52px for sunlight; 64px for the wallet CTA." -->
<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;padding:24px 28px;background:var(--paper-50);font-family:var(--font-body);color:var(--ink-1000);display:flex;gap:18px;align-items:center}
  .tap{display:flex;align-items:center;justify-content:center;background:var(--pine-700);color:var(--paper-100);border-radius:10px;font-weight:600;padding:0 24px}
  .lbl{font-family:var(--font-mono);font-size:10px;color:var(--ink-500);letter-spacing:0.04em;text-align:center;line-height:1.3;margin-top:8px}
  .lbl b{color:var(--ink-1000)}
  .col{display:flex;flex-direction:column;align-items:center}
</style></head>
<body>
  <div class="col"><div class="tap" style="height:44px;font-size:14px">Save</div><span class="lbl"><b>min · 44</b><br>iOS HIG floor</span></div>
  <div class="col"><div class="tap" style="height:52px;font-size:15px">Check in</div><span class="lbl"><b>comfy · 52</b><br>outdoor</span></div>
  <div class="col"><div class="tap" style="height:64px;font-size:18px;padding:0 32px">Add to Apple Wallet</div><span class="lbl"><b>large · 64</b><br>primary CTA</span></div>
</body></html>
