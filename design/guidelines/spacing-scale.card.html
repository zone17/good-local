<!-- @dsCard group="Spacing" viewport="700x180" name="Spacing scale" subtitle="4-px base. UI rhythm — gap, padding, margins." -->
<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;padding:24px 28px;background:var(--paper-50);font-family:var(--font-body);color:var(--ink-1000)}
  .scale{display:flex;align-items:flex-end;gap:18px}
  .step{display:flex;flex-direction:column;align-items:flex-start;gap:6px}
  .bar{background:var(--pine-700);height:80px;border-radius:2px}
  .lbl{font-family:var(--font-mono);font-size:10px;color:var(--ink-500);letter-spacing:0.05em}
  .lbl b{color:var(--ink-1000);font-weight:600}
</style></head>
<body>
  <div class="scale">
    <div class="step"><div class="bar" style="width:4px"></div><span class="lbl"><b>1</b>·4</span></div>
    <div class="step"><div class="bar" style="width:8px"></div><span class="lbl"><b>2</b>·8</span></div>
    <div class="step"><div class="bar" style="width:12px"></div><span class="lbl"><b>3</b>·12</span></div>
    <div class="step"><div class="bar" style="width:16px"></div><span class="lbl"><b>4</b>·16</span></div>
    <div class="step"><div class="bar" style="width:20px"></div><span class="lbl"><b>5</b>·20</span></div>
    <div class="step"><div class="bar" style="width:24px"></div><span class="lbl"><b>6</b>·24</span></div>
    <div class="step"><div class="bar" style="width:32px"></div><span class="lbl"><b>8</b>·32</span></div>
    <div class="step"><div class="bar" style="width:40px"></div><span class="lbl"><b>10</b>·40</span></div>
    <div class="step"><div class="bar" style="width:48px"></div><span class="lbl"><b>12</b>·48</span></div>
    <div class="step"><div class="bar" style="width:64px"></div><span class="lbl"><b>16</b>·64</span></div>
    <div class="step"><div class="bar" style="width:80px"></div><span class="lbl"><b>20</b>·80</span></div>
  </div>
</body></html>
