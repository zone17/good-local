<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;padding:24px;background:var(--paper-50);display:flex;align-items:center;justify-content:center;gap:32px}
  .tile{width:140px;height:140px;display:grid;place-items:center;border-radius:12px}
  .paper{background:var(--paper-50);color:var(--pine-700);box-shadow:inset 0 0 0 1px var(--ink-100)}
  .kraft{background:var(--paper-300);color:var(--pine-1000)}
  .pine{background:var(--pine-700);color:var(--paper-100)}
  .stamp{background:var(--paper-100);color:var(--stamp-700)}
</style></head>
<body>
  <div class="tile paper"><img src="../assets/seal-mark.svg" style="width:104px;height:104px;color:currentColor" /></div>
  <div class="tile kraft"><img src="../assets/seal-mark.svg" style="width:104px;height:104px"/></div>
  <div class="tile pine"><img src="../assets/seal-mark.svg" style="width:104px;height:104px"/></div>
  <div class="tile stamp"><img src="../assets/seal-mark.svg" style="width:104px;height:104px"/></div>
</body></html>
