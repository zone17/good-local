<!-- @dsCard group="Spacing" viewport="700x160" name="Motion" subtitle="Short. Competent. No bounces, no confetti." -->
<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;padding:24px 28px;background:var(--paper-50);font-family:var(--font-body);color:var(--ink-1000);display:grid;grid-template-columns:1fr 1fr;gap:14px 28px;font-size:13px}
  .row{display:flex;align-items:center;justify-content:space-between;gap:16px;border-bottom:1px dashed var(--ink-200);padding-bottom:10px}
  .name{font-family:var(--font-mono);font-size:11px;color:var(--ink-1000);font-weight:600;letter-spacing:0.04em}
  .desc{color:var(--ink-500)}
  .val{font-family:var(--font-mono);font-size:11px;color:var(--ink-700)}
</style></head>
<body>
  <div class="row"><span class="name">instant</span><span class="desc">tap acknowledge</span><span class="val">80ms</span></div>
  <div class="row"><span class="name">quick</span><span class="desc">hover, fade</span><span class="val">140ms</span></div>
  <div class="row"><span class="name">base ★</span><span class="desc">page, sheet</span><span class="val">220ms</span></div>
  <div class="row"><span class="name">slow</span><span class="desc">large overlay</span><span class="val">400ms</span></div>
  <div class="row"><span class="name">stamp</span><span class="desc">check-in press</span><span class="val">520ms</span></div>
  <div class="row"><span class="name">ease-stamp</span><span class="desc">slight overshoot</span><span class="val">cubic 1.32</span></div>
</body></html>
